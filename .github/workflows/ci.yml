name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/realtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: services/realtime/go.sum
      - run: go vet ./...

  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/realtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: services/realtime/go.sum
      - run: go test ./internal/... ./cmd/... -v -count=1 -timeout 120s

  go-vuln:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/realtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: services/realtime/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run vulnerability scan
        run: govulncheck ./... || echo "::warning::govulncheck found known CVEs in dependencies (non-blocking)"

  go-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/realtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: services/realtime/go.sum
      - run: go build ./...

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway
          - match-service
          - platform-service
          - matchmaking-service
          - analysis-worker
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/railway/${{ matrix.service == 'analysis-worker' && 'Dockerfile.analysis-worker' || format('{0}.Dockerfile', matrix.service) }}
          push: false
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

  web-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: corepack enable && pnpm install
      - run: pnpm run lint

  packages-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: corepack enable && pnpm install
      - run: pnpm --filter @chess404/contracts run lint
      - run: pnpm --filter @chess404/game-core run lint

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: corepack enable && pnpm install
      - run: pnpm run build
