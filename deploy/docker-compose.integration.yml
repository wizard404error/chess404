version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: chess404_test
    ports:
      - 5432:5432
    healthcheck:
      test: pg_isready -U test
      interval: 2s
      timeout: 2s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    healthcheck:
      test: redis-cli ping
      interval: 2s
      timeout: 2s
      retries: 10

  integration-runner:
    build:
      context: .
      dockerfile: Dockerfile.integration
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TEST_POSTGRES_URL: postgres://test:test@postgres:5432/chess404_test?sslmode=disable
      TEST_REDIS_URL: redis://redis:6379/0
