groups:
  - name: chess404
    interval: 30s
    rules:
      - alert: GatewayDown
        expr: up{job="gateway"} == 0
        for: 30s
        labels: { severity: critical }
        annotations: { summary: "Gateway is down" }

      - alert: MatchServiceDown
        expr: up{job="match-service"} == 0
        for: 30s
        labels: { severity: critical }
        annotations: { summary: "Match service is unreachable" }

      - alert: PlatformServiceDown
        expr: up{job="platform-service"} == 0
        for: 30s
        labels: { severity: critical }
        annotations: { summary: "Platform service is unreachable" }

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 2m
        labels: { severity: warning }
        annotations: { summary: "CPU usage above 80% for 2 minutes" }

      - alert: HighMemoryUsage
        expr: go_memstats_alloc_bytes / 1e9 > 2
        for: 2m
        labels: { severity: warning }
        annotations: { summary: "Memory usage above 2GB" }

      - alert: DatabaseWriteLatency
        expr: rate(db_write_duration_seconds_sum[1m]) / rate(db_write_duration_seconds_count[1m]) > 0.5
        for: 1m
        labels: { severity: warning }
        annotations: { summary: "Database write latency above 500ms" }

      - alert: WebSocketChannelDrops
        expr: rate(push_snapshot_drops_total[1m]) > 0
        for: 1m
        labels: { severity: warning }
        annotations: { summary: "WebSocket channel drops detected" }

      - alert: MatchQueueDepth
        expr: matchmaking_queue_depth{queue="rated"} > 50
        for: 1m
        labels: { severity: info }
        annotations: { summary: "Rated queue depth above 50" }

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels: { severity: critical }
        annotations: { summary: "HTTP 5xx error rate above 5%" }
